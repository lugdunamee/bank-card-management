services:
  db:
    image: postgres:15
    container_name: bank_db_container
    environment:
      - POSTGRES_DB=bank_db          # Должно совпадать с URL в properties
      - POSTGRES_USER=postgres       # Должно совпадать с username
      - POSTGRES_PASSWORD=password   # Должно совпадать с password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: